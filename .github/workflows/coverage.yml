name: Post coverage comment
jobs:
  test:
    name: Run tests & display coverage
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    permissions:
      pull-requests: write
      contents: write
      actions: read
    steps:
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: downstream coverage.yml about to post comment"
        printf '%s\n' "--- Workflow run event details ---"
        echo "workflow_run.id=${{ github.event.workflow_run.id }}"
        echo "workflow_run.event=${{ github.event.workflow_run.event }}"
        echo "workflow_run.conclusion=${{ github.event.workflow_run.conclusion }}"
        echo "GITHUB_REPOSITORY=${{ github.repository }}"
        printf '%s\n' "--- Checking for comment artifact ---"
        ls -la python-coverage-comment-action.txt 2>/dev/null && echo "Comment file exists" || echo "No comment file found"
      continue-on-error: true
    - name: Post comment
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_PR_RUN_ID: ${{ github.event.workflow_run.id }}
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  workflow_run:
    workflows:
    - Tests
    types:
    - completed
